<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <style>
    text { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
    .title { font-size: 16px; font-weight: bold; }
    .code { font-size: 10px; fill: #0055aa; cursor: pointer; }
    .code:hover { fill: #ff6600; font-weight: bold; }
    .dim { font-size: 9px; fill: #666; }
    .border { fill: none; stroke: #000; stroke-width: 1; }
    .part-outline { fill: none; stroke: #333; stroke-width: 1.5; }
    .leader { stroke: #666; stroke-width: 0.5; fill: none; }
  </style>

  <!-- Bordo tavola -->
  <rect class="border" x="10" y="10" width="780" height="580" rx="2"/>
  <rect class="border" x="580" y="520" width="200" height="60"/>

  <!-- Titolo -->
  <text class="title" x="590" y="540">TAV-001</text>
  <text x="590" y="555" style="font-size:10px;fill:#666">Telaio Principale - Vista frontale</text>
  <text x="590" y="568" style="font-size:9px;fill:#999">Rev. 1.3 - CT PACK</text>

  <!-- Disegno pezzo principale: telaio rettangolare -->
  <rect class="part-outline" x="150" y="100" width="400" height="350" rx="5"/>
  <rect class="part-outline" x="170" y="120" width="360" height="310" rx="3" stroke-dasharray="5,3"/>

  <!-- Piastre laterali -->
  <rect class="part-outline" x="130" y="140" width="20" height="120" fill="#e8e8ff"/>
  <rect class="part-outline" x="550" y="140" width="20" height="120" fill="#e8e8ff"/>

  <!-- Fori viti -->
  <circle cx="160" cy="130" r="5" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="540" cy="130" r="5" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="160" cy="420" r="5" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="540" cy="420" r="5" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="350" cy="130" r="5" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="350" cy="420" r="5" fill="none" stroke="#333" stroke-width="1"/>

  <!-- Leader lines e codici -->
  <line class="leader" x1="130" y1="200" x2="50" y2="180"/>
  <text class="code" x="20" y="175">C.PRTZ.LCCH.000000</text>
  <text class="dim" x="20" y="188">Piastra chiusura (x2)</text>

  <line class="leader" x1="160" y1="130" x2="80" y2="80"/>
  <text class="code" x="20" y="75">C.VITI.VTTE.000047</text>
  <text class="dim" x="20" y="88">Vite TCEI M8x25 (x16)</text>

  <line class="leader" x1="175" y1="130" x2="80" y2="50"/>
  <text class="code" x="20" y="45">C.RSTT.PIAN.000009</text>
  <text class="dim" x="20" y="58">Rondella piana M8 (x8)</text>

  <!-- Riferimento a TAV-002 -->
  <rect x="600" y="350" width="140" height="30" rx="4" fill="#fff3e0" stroke="#e0a855"/>
  <text class="code" x="620" y="370" style="fill:#e0a855;font-size:12px">TAV-002</text>
  <text x="665" y="370" style="font-size:9px;fill:#999">Dettaglio A</text>

  <!-- Cerchio dettaglio -->
  <circle cx="350" cy="275" r="60" fill="none" stroke="#e0a855" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="335" y="280" style="font-size:10px;fill:#e0a855">A</text>
  <line class="leader" x1="400" y1="240" x2="600" y2="365" stroke="#e0a855" stroke-dasharray="3,3"/>
</svg>
